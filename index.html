<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verse of the Day</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    background:
      linear-gradient(rgba(5, 10, 25, 0.68), rgba(5, 10, 25, 0.78)),
      radial-gradient(circle at top left, #2457a6, #101827 55%, #050816);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .verse-card {
    width: 86%;
    max-width: 1500px;
    padding: 70px 80px;
    border-radius: 36px;
    background: rgba(0, 0, 0, 0.38);
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    text-align: center;
  }

  .label {
    font-size: clamp(28px, 3vw, 58px);
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
    color: #f7d36b;
  }

  .verse {
    font-size: clamp(38px, 4.4vw, 82px);
    line-height: 1.18;
    font-weight: 700;
    margin-bottom: 45px;
  }

  .reference {
    font-size: clamp(28px, 2.8vw, 54px);
    font-weight: 700;
    color: #ffffff;
    opacity: 0.92;
  }

  .footer {
    margin-top: 45px;
    font-size: clamp(18px, 1.6vw, 30px);
    opacity: 0.75;
  }
</style>
</head>

<body>
  <div class="verse-card">
    <div class="label">Verse of the Day</div>
    <div class="verse" id="verseText">Loading today's verse...</div>
    <div class="reference" id="verseRef"></div>
    <div class="footer">Versailles United Methodist Church</div>
  </div>

<script>
async function loadVerse() {
  try {
    const response = await fetch("data/verse.json?v=" + Date.now());

    if (!response.ok) {
      throw new Error("Verse file could not be loaded.");
    }

    const verse = await response.json();

    document.getElementById("verseText").textContent = `“${verse.text}”`;
    document.getElementById("verseRef").textContent =
      `${verse.reference} (${verse.translation})`;

  } catch (error) {
    console.error("Unable to load Verse of the Day:", error);

    document.getElementById("verseText").textContent =
      "Unable to load today's verse.";
    document.getElementById("verseRef").textContent = "";
  }
}

loadVerse();
</script>
</body>
</html>
